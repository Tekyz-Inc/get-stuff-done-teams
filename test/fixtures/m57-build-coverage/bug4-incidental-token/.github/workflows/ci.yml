name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install
        run: npm ci
      - name: Sanity-check husky install
        run: |
          ls -la node_modules/husky/hooks/
      - name: Build src
        run: |
          cp -r src/ out/
