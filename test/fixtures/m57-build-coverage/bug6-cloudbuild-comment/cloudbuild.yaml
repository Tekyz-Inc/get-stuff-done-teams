steps:
  # deploy: hooks/ are managed by terraform, not packaged here
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/app', '-f', 'Dockerfile', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/app']
artifacts:
  images:
    - 'gcr.io/$PROJECT_ID/app'
